<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 // GAME_ZONE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<div class="header">
  <a class="brand" href="../index.html">GAME_ZONE<span class="dim">.arcade</span></a>
  <div class="status"><span class="led"></span>1P</div>
</div>
<div class="back-wrap"><a class="back-link" href="../index.html">← back to menu</a></div>

<div class="game-panel">
  <div class="console">
    <div class="info-bar">
      <span>SCORE <span class="lcd" id="score">0</span></span>
      <span>BEST <span class="lcd" id="best">0</span></span>
    </div>
    <div class="g2048-board" id="board"></div>
    <button class="btn" id="restart">↺ New Game</button>
    <p style="font-family:var(--font-mono);font-size:0.7em;color:var(--text-dim);margin-top:10px;">swipe or use arrow keys</p>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="tag" id="overlayTag">SYSTEM</div>
    <h2 id="overlayTitle">NO MOVES LEFT</h2>
    <p id="overlaySubtitle">Score 0</p>
    <button class="btn" id="overlayBtn">Continue</button>
  </div>
</div>

<script src="../shared/common.js"></script>
<script>
(function(){
  const boardEl = document.getElementById('board');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  let grid, score, best, over;

  best = parseInt(localStorage.getItem('2048best') || '0');
  bestEl.textContent = best;

  const colors = {
    2:['#0f2a22','#d3ece1'], 4:['#123526','#d3ece1'], 8:['#1f8a5c','#06110c'],
    16:['#27a86e','#06110c'], 32:['#3dffa0','#06110c'], 64:['#ffb020','#06110c'],
    128:['#ff9d1f','#06110c'], 256:['#ff8a1f','#06110c'], 512:['#ff7020','#06110c'],
    1024:['#ff5f5f','#06110c'], 2048:['#4ea8ff','#06110c']
  };

  function init(){
    grid = Array(4).fill().map(() => Array(4).fill(0));
    score = 0;
    over = false;
    scoreEl.textContent = 0;
    addTile(); addTile();
    render();
  }

  function addTile(){
    const empty = [];
    for (let r=0;r<4;r++) for (let c=0;c<4;c++) if (!grid[r][c]) empty.push([r,c]);
    if (!empty.length) return;
    const [r,c] = empty[Math.floor(Math.random()*empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  }

  function render(){
    boardEl.innerHTML = '';
    for (let r=0;r<4;r++) for (let c=0;c<4;c++) {
      const v = grid[r][c];
      const cell = document.createElement('div');
      cell.className = 'g2048-cell';
      if (v) {
        cell.textContent = v;
        const [bg, fg] = colors[v] || ['#4ea8ff','#06110c'];
        cell.style.background = bg;
        cell.style.color = fg;
        cell.style.fontSize = v > 512 ? '1em' : '1.25em';
      }
      boardEl.appendChild(cell);
    }
  }

  function slide(row){
    const nums = row.filter(x => x);
    const merged = [];
    for (let i=0;i<nums.length;i++) {
      if (i+1 < nums.length && nums[i] === nums[i+1]) {
        const v = nums[i]*2;
        merged.push(v);
        score += v;
        i++;
      } else merged.push(nums[i]);
    }
    while (merged.length < 4) merged.push(0);
    return merged;
  }

  function rotate(g){
    const n = Array(4).fill().map(()=>Array(4).fill(0));
    for (let r=0;r<4;r++) for (let c=0;c<4;c++) n[c][3-r] = g[r][c];
    return n;
  }

  function move(dir){
    if (over) return;
    let g = grid.map(r=>r.slice());
    let rotations = {left:0, up:1, right:2, down:3}[dir];
    for (let i=0;i<rotations;i++) g = rotate(g);
    const before = JSON.stringify(g);
    g = g.map(slide);
    const after = JSON.stringify(g);
    for (let i=0;i<(4-rotations)%4;i++) g = rotate(g);
    if (before !== JSON.stringify(g.map((r,ri)=>r)) || before !== after) {
      // detect change properly by comparing rotated-back grid to original
    }
    const changed = JSON.stringify(grid) !== JSON.stringify(g);
    grid = g;
    if (changed) {
      scoreEl.textContent = score;
      addTile();
      render();
      checkGameOver();
    }
  }

  function checkGameOver(){
    for (let r=0;r<4;r++) for (let c=0;c<4;c++) {
      if (!grid[r][c]) return;
      if (c<3 && grid[r][c]===grid[r][c+1]) return;
      if (r<3 && grid[r][c]===grid[r+1][c]) return;
      if (grid[r][c] === 2048) {
        over = true;
        if (score > best) { best = score; localStorage.setItem('2048best', best); bestEl.textContent = best; }
        showOverlay('MILESTONE', '2048 REACHED!', `Score ${score}`, init, true);
        return;
      }
    }
    over = true;
    if (score > best) { best = score; localStorage.setItem('2048best', best); bestEl.textContent = best; }
    showOverlay('SYSTEM', 'NO MOVES LEFT', `Final score ${score} · Best ${best}`, init, false);
  }

  document.getElementById('restart').addEventListener('click', init);

  document.addEventListener('keydown', (e) => {
    if (e.key==='ArrowLeft') move('left');
    if (e.key==='ArrowRight') move('right');
    if (e.key==='ArrowUp') move('up');
    if (e.key==='ArrowDown') move('down');
  });

  let sx=0, sy=0;
  boardEl.addEventListener('touchstart', e => { sx=e.touches[0].clientX; sy=e.touches[0].clientY; });
  boardEl.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if (Math.max(Math.abs(dx),Math.abs(dy)) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx>0?'right':'left');
    else move(dy>0?'down':'up');
  });

  init();
})();
</script>
</body>
</html>
