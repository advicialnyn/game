<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake // GAME_ZONE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>

<div class="header">
  <a class="brand" href="../index.html">GAME_ZONE<span class="dim">.arcade</span></a>
  <div class="status"><span class="led"></span>1P</div>
</div>

<div class="back-wrap"><a class="back-link" href="../index.html">← back to menu</a></div>

<div class="game-panel">
  <div class="console">
    <div class="info-bar">
      <span>SCORE <span class="lcd" id="snakeScore">0</span></span>
      <span>BEST <span class="lcd" id="snakeBest">0</span></span>
    </div>
    <canvas id="snakeCanvas" width="320" height="320"></canvas>
    <div><button class="btn" id="snakeStart">▶ Start</button></div>
    <div class="dpad">
      <button class="up">▲</button>
      <button class="left">◀</button>
      <button class="right">▶</button>
      <button class="down">▼</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="tag" id="overlayTag">SYSTEM</div>
    <h2 id="overlayTitle">GAME OVER</h2>
    <p id="overlaySubtitle">Score 0</p>
    <button class="btn" id="overlayBtn">Continue</button>
  </div>
</div>

<script src="../shared/common.js"></script>
<script>
(function(){
  const canvas = document.getElementById('snakeCanvas');
  const ctx = canvas.getContext('2d');
  const box = 16;
  const cols = canvas.width / box;
  let snake, direction, nextDirection, food, score, best, loop, running;

  best = parseInt(localStorage.getItem('snakeBest') || '0');
  document.getElementById('snakeBest').textContent = best;

  function resetGame(){
    snake = [{x: 8, y: 8}];
    direction = {x: 1, y: 0};
    nextDirection = {x: 1, y: 0};
    score = 0;
    document.getElementById('snakeScore').textContent = score;
    placeFood();
    running = true;
    draw();
    clearInterval(loop);
    loop = setInterval(tick, 120);
  }

  function placeFood(){
    food = {
      x: Math.floor(Math.random() * cols),
      y: Math.floor(Math.random() * cols)
    };
    for (const s of snake) {
      if (s.x === food.x && s.y === food.y) { placeFood(); return; }
    }
  }

  function draw(){
    ctx.fillStyle = '#081310';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#ffb020';
    ctx.shadowColor = '#ffb020';
    ctx.shadowBlur = 6;
    ctx.fillRect(food.x * box, food.y * box, box - 2, box - 2);
    ctx.shadowBlur = 0;

    snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? '#3dffa0' : '#1f8a5c';
      if (i === 0) {
        ctx.shadowColor = '#3dffa0';
        ctx.shadowBlur = 8;
      }
      ctx.fillRect(s.x * box, s.y * box, box - 2, box - 2);
      ctx.shadowBlur = 0;
    });
  }

  function tick(){
    if (!running) return;
    direction = nextDirection;
    const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

    if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= cols || snake.some(s => s.x === head.x && s.y === head.y)) {
      running = false;
      clearInterval(loop);
      let newBest = false;
      if (score > best) {
        best = score;
        localStorage.setItem('snakeBest', best);
        document.getElementById('snakeBest').textContent = best;
        newBest = true;
      }
      showOverlay(
        newBest ? 'NEW RECORD' : 'SYSTEM',
        newBest ? 'NEW BEST SCORE' : 'GAME OVER',
        `Score ${score} · Best ${best}`,
        resetGame,
        newBest
      );
      return;
    }

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      document.getElementById('snakeScore').textContent = score;
      placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  document.getElementById('snakeStart').addEventListener('click', resetGame);

  // pause the loop if the tab/page is hidden (switching apps, locking phone, etc.)
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      running = false;
      clearInterval(loop);
    }
  });

  function setDir(x, y){
    if (direction.x === -x && direction.y === -y) return;
    nextDirection = {x, y};
  }

  document.querySelector('.dpad .up').addEventListener('click', () => setDir(0, -1));
  document.querySelector('.dpad .down').addEventListener('click', () => setDir(0, 1));
  document.querySelector('.dpad .left').addEventListener('click', () => setDir(-1, 0));
  document.querySelector('.dpad .right').addEventListener('click', () => setDir(1, 0));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp') setDir(0, -1);
    if (e.key === 'ArrowDown') setDir(0, 1);
    if (e.key === 'ArrowLeft') setDir(-1, 0);
    if (e.key === 'ArrowRight') setDir(1, 0);
  });

  let touchStartX = 0, touchStartY = 0;
  canvas.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  });
  canvas.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy)) {
      setDir(dx > 0 ? 1 : -1, 0);
    } else {
      setDir(0, dy > 0 ? 1 : -1);
    }
  });

  snake = [{x: 8, y: 8}];
  direction = {x: 1, y: 0};
  food = {x: 12, y: 8};
  draw();
  running = false;
})();
</script>

</body>
</html>
