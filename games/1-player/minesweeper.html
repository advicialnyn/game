<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper // GAME_ZONE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<div class="header">
  <a class="brand" href="../index.html">GAME_ZONE<span class="dim">.arcade</span></a>
  <div class="status"><span class="led"></span>1P</div>
</div>
<div class="back-wrap"><a class="back-link" href="../index.html">← back to menu</a></div>

<div class="game-panel">
  <div class="console">
    <div class="info-bar">
      <span>MINES <span class="lcd" id="mineCount">10</span></span>
      <span>FLAGS <span class="lcd" id="flagCount">0</span></span>
    </div>
    <div class="mine-grid" id="grid" style="grid-template-columns:repeat(10,1fr);"></div>
    <div class="mode-toggle">
      <button class="btn active" id="modeDig">💣 Dig</button>
      <button class="btn" id="modeFlag">🚩 Flag</button>
    </div>
    <button class="btn" id="restart">↺ New Board</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="tag" id="overlayTag">SYSTEM</div>
    <h2 id="overlayTitle">BOOM</h2>
    <p id="overlaySubtitle">You hit a mine.</p>
    <button class="btn" id="overlayBtn">Continue</button>
  </div>
</div>

<script src="../shared/common.js"></script>
<script>
(function(){
  const gridEl = document.getElementById('grid');
  const mineCountEl = document.getElementById('mineCount');
  const flagCountEl = document.getElementById('flagCount');
  const ROWS = 10, COLS = 10, MINES = 12;
  let cells, revealedCount, flagCount, over, mode = 'dig';

  function init(){
    cells = Array(ROWS).fill().map(() => Array(COLS).fill().map(() => ({mine:false, adj:0, revealed:false, flag:false})));
    let placed = 0;
    while (placed < MINES) {
      const r = Math.floor(Math.random()*ROWS), c = Math.floor(Math.random()*COLS);
      if (!cells[r][c].mine) { cells[r][c].mine = true; placed++; }
    }
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
      if (cells[r][c].mine) continue;
      let n=0;
      for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
        const nr=r+dr, nc=c+dc;
        if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&cells[nr][nc].mine) n++;
      }
      cells[r][c].adj = n;
    }
    revealedCount = 0;
    flagCount = 0;
    over = false;
    mineCountEl.textContent = MINES;
    flagCountEl.textContent = 0;
    render();
  }

  function render(){
    gridEl.innerHTML = '';
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
      const cell = cells[r][c];
      const div = document.createElement('div');
      div.className = 'mine-cell';
      if (cell.revealed) {
        div.classList.add('revealed');
        if (cell.mine) { div.classList.add('mine'); div.textContent = '💣'; }
        else if (cell.adj) div.textContent = cell.adj;
      } else if (cell.flag) {
        div.classList.add('flag');
        div.textContent = '🚩';
      }
      div.addEventListener('click', () => handleClick(r,c));
      gridEl.appendChild(div);
    }
  }

  function reveal(r,c){
    if (r<0||r>=ROWS||c<0||c>=COLS) return;
    const cell = cells[r][c];
    if (cell.revealed || cell.flag) return;
    cell.revealed = true;
    revealedCount++;
    if (cell.adj === 0 && !cell.mine) {
      for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) reveal(r+dr,c+dc);
    }
  }

  function handleClick(r,c){
    if (over) return;
    const cell = cells[r][c];
    if (mode === 'flag') {
      if (cell.revealed) return;
      cell.flag = !cell.flag;
      flagCount += cell.flag ? 1 : -1;
      flagCountEl.textContent = flagCount;
      render();
      return;
    }
    if (cell.flag || cell.revealed) return;
    if (cell.mine) {
      cell.revealed = true;
      over = true;
      for (let rr=0;rr<ROWS;rr++) for (let cc=0;cc<COLS;cc++) if (cells[rr][cc].mine) cells[rr][cc].revealed = true;
      render();
      showOverlay('SYSTEM', 'BOOM', 'You hit a mine.', init, false);
      return;
    }
    reveal(r,c);
    render();
    if (revealedCount === ROWS*COLS - MINES) {
      over = true;
      showOverlay('COMPLETE', 'BOARD CLEARED', `All ${MINES} mines avoided.`, init, true);
    }
  }

  document.getElementById('modeDig').addEventListener('click', (e) => {
    mode = 'dig';
    document.getElementById('modeDig').classList.add('active');
    document.getElementById('modeFlag').classList.remove('active');
  });
  document.getElementById('modeFlag').addEventListener('click', (e) => {
    mode = 'flag';
    document.getElementById('modeFlag').classList.add('active');
    document.getElementById('modeDig').classList.remove('active');
  });

  document.getElementById('restart').addEventListener('click', init);
  init();
})();
</script>
</body>
</html>
